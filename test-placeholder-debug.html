<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug Placeholder Blocks</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .debug-section {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .debug-section h3 {
      margin-top: 0;
      color: #333;
    }
    pre {
      background: white;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 12px;
    }
    .test-result {
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
    }
    .test-pass {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .test-fail {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <h1>🔍 Debug: Placeholder Blocks for MK/Musikk</h1>
  <p>This page tests if placeholder blocks are correctly generated for programs with obligatoriske programfag.</p>

  <div id="results"></div>

  <script type="module">
    import { DataHandler } from './src/core/data-handler.js';

    const resultsDiv = document.getElementById('results');

    function addResult(title, content, isPass = true) {
      const section = document.createElement('div');
      section.className = 'debug-section';
      section.innerHTML = `
        <h3>${title}</h3>
        <div class="test-result ${isPass ? 'test-pass' : 'test-fail'}">
          ${isPass ? '✓ PASS' : '✗ FAIL'}
        </div>
        <pre>${content}</pre>
      `;
      resultsDiv.appendChild(section);
    }

    async function runTests() {
      try {
        // Initialize DataHandler
        const dataHandler = new DataHandler({
          schoolSlug: 'bergen-private',
          useLocalAPI: false
        });

        await dataHandler.init();

        addResult('✓ DataHandler initialized', 'Successfully loaded API data', true);

        // Test 1: Get blocks for Medier og kommunikasjon (MK)
        const mkVg2 = dataHandler.getFagForProgramOgTrinn('medier-kommunikasjon', 'vg2');
        const mkVg3 = dataHandler.getFagForProgramOgTrinn('medier-kommunikasjon', 'vg3');

        addResult(
          'Test 1: MK VG2 blocks',
          JSON.stringify(mkVg2, null, 2),
          Object.keys(mkVg2).length > 0
        );

        addResult(
          'Test 2: MK VG3 blocks',
          JSON.stringify(mkVg3, null, 2),
          Object.keys(mkVg3).length > 0
        );

        // Test 3: Check if any blocks have empty fag arrays
        let hasEmptyBlocks = false;
        let emptyBlockCount = 0;

        Object.entries(mkVg2).forEach(([blokkId, blokk]) => {
          if (blokk.fag.length === 0) {
            hasEmptyBlocks = true;
            emptyBlockCount++;
          }
        });

        Object.entries(mkVg3).forEach(([blokkId, blokk]) => {
          if (blokk.fag.length === 0) {
            hasEmptyBlocks = true;
            emptyBlockCount++;
          }
        });

        addResult(
          'Test 3: Empty blocks detected',
          `Found ${emptyBlockCount} empty blocks (placeholders)\n` +
          `Expected: > 0 for MK program\n` +
          `Result: ${hasEmptyBlocks ? 'PASS - Placeholders should be rendered' : 'FAIL - No empty blocks found'}`,
          hasEmptyBlocks
        );

        // Test 4: Check Musikk program
        const musikkVg2 = dataHandler.getFagForProgramOgTrinn('musikk-dans-drama', 'vg2');
        const musikkVg3 = dataHandler.getFagForProgramOgTrinn('musikk-dans-drama', 'vg3');

        let musikkEmptyCount = 0;
        Object.entries(musikkVg2).forEach(([blokkId, blokk]) => {
          if (blokk.fag.length === 0) musikkEmptyCount++;
        });
        Object.entries(musikkVg3).forEach(([blokkId, blokk]) => {
          if (blokk.fag.length === 0) musikkEmptyCount++;
        });

        addResult(
          'Test 4: Musikk empty blocks',
          `Found ${musikkEmptyCount} empty blocks for Musikk\n` +
          JSON.stringify({ vg2: musikkVg2, vg3: musikkVg3 }, null, 2),
          musikkEmptyCount > 0
        );

        // Test 5: Verify the filtering logic in data-handler
        const rawBlokker = dataHandler.getBlokker();
        const blokk1 = rawBlokker.blokk1;

        if (blokk1) {
          const mkTilgjengelig = blokk1.tilgjengeligFor?.vg2?.includes('medier-kommunikasjon');
          const fagInBlokk1 = blokk1.fag || [];
          const fagForMk = fagInBlokk1.filter(f =>
            f.trinn === 'vg2' &&
            (f.tilgjengeligFor || []).includes('medier-kommunikasjon')
          );

          addResult(
            'Test 5: Blokk1 filtering logic',
            `Block available for MK: ${mkTilgjengelig}\n` +
            `Total fag in blokk1: ${fagInBlokk1.length}\n` +
            `Fag for MK VG2: ${fagForMk.length}\n` +
            `Fag details: ${JSON.stringify(fagForMk, null, 2)}\n\n` +
            `EXPECTED: If mkTilgjengelig=true but fagForMk.length=0, block should still be included as placeholder`,
            true
          );
        }

        // Test 6: Check CSS exists
        const cssResponse = await fetch('/styles/studieplanlegger.css');
        const cssText = await cssResponse.text();
        const hasPlaceholderCSS = cssText.includes('.sp-blokk-placeholder');

        addResult(
          'Test 6: CSS for placeholders',
          `CSS file loaded: ${cssResponse.ok}\n` +
          `Contains .sp-blokk-placeholder: ${hasPlaceholderCSS}`,
          hasPlaceholderCSS
        );

      } catch (error) {
        addResult(
          'ERROR',
          error.stack || error.message,
          false
        );
      }
    }

    runTests();
  </script>
</body>
</html>
